<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portfolio Documentation — Abhishek Bhosale</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Technical documentation for Abhishek Bhosale's portfolio site: architecture, deployment, and the AI chat widget.">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">

  <style>
    /* Fixed top header showing the guide name */
    .guide-header{
      position:fixed; top:0; left:0; right:0; z-index:999;
      height:52px; display:flex; align-items:center;
      padding:0 20px; background:#0f2b46; color:#fff;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      box-shadow:0 2px 8px rgba(0,0,0,0.12);
    }
    .guide-header .guide-title{font-size:.95rem; font-weight:600; letter-spacing:.01em;}
    .guide-header .guide-sep{margin:0 10px; opacity:.5;}
    .guide-header .guide-sub{font-size:.82rem; opacity:.85; font-weight:400;}
    .guide-header a{color:#fff; text-decoration:none;}
    .guide-header a:hover{text-decoration:underline;}

    /* Push Docsify's own UI down so it doesn't sit under the fixed header */
    .sidebar, .sidebar-toggle, main{ margin-top:52px; }
    body{ padding-top:0; }

    /* Right-side mini table of contents (generated by docsify-plugin-toc) */
    .toc-nav{
      position:fixed; top:72px; right:20px; width:230px; max-height:calc(100vh - 100px);
      overflow-y:auto; font-size:.82rem; padding-left:12px;
      border-left:1px solid #eee; display:none;
    }
    @media (min-width:1450px){
      .toc-nav{ display:block; }
      main{ margin-right:260px; }
    }
    .toc-nav li{ list-style:none; margin:4px 0; }
    .toc-nav a{ color:#505d6b; }
    .toc-nav a.active{ color:#0f2b46; font-weight:600; }
  </style>
</head>

<body>
  <div class="guide-header">
    <span class="guide-title">Abhishek Bhosale</span>
    <span class="guide-sep">/</span>
    <span class="guide-sub">Portfolio Documentation</span>
  </div>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Portfolio Docs',
      repo: 'https://github.com/Abhishekbhosale12/abhishek_portfolio',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search documentation...',
        noData: 'No results found.',
        depth: 4
      },
      toc: {
        tocMaxLevel: 3,
        target: 'h2, h3',
        ignoreHeaders: ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
